---
services:
  template-db:
    container_name: template-db
    image: postgres:18.3
    restart: on-failure
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - internal

  template-api:
    container_name: template-backend
    build:
      context: ./fastapi-app
      dockerfile: Dockerfile
    restart: on-failure
    env_file:
      - fastapi-app/.env
    environment:
      DB__POSTGRES_SERVER: template-db
    depends_on:
      - template-db
    volumes:
      - ./fastapi-app/src:/usr/src/app/src
    ports:
      - "8000:8000"
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
